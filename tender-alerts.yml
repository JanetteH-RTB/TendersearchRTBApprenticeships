name: RTB Tender Alerts

on:
  schedule:
    # Two runs a day for reliability, because GitHub's free scheduled
    # runs are often delayed or skipped. seen.json stops the second run
    # re-sending anything the first already covered. Both times are UTC.
    - cron: "15 7 * * 1-5"    # ~07:15 UTC (morning)
    - cron: "15 13 * * 1-5"   # ~13:15 UTC (afternoon backup)
  workflow_dispatch:          # lets you run it manually from the Actions tab

permissions:
  contents: write            # needed so the job can commit seen.json back

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run tender monitor
        env:
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: ${{ secrets.MAIL_TO }}
          LOOKBACK_DAYS: "2"
          # Only the morning run sends an empty-day "nothing found" note,
          # so quiet days don't produce two confirmation emails.
          SEND_EMPTY: ${{ github.event.schedule == '15 13 * * 1-5' && 'no' || 'yes' }}
        run: python tender_monitor.py

      - name: Save seen-notice state
        run: |
          git config user.name "tender-bot"
          git config user.email "tender-bot@users.noreply.github.com"
          git add seen.json
          if git diff --staged --quiet; then
            echo "No new notices to record."
          else
            git commit -m "Update seen notices [skip ci]"
            git push
          fi
